<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Geography GK | Learning Skills</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef8ff;
}

header{
background:linear-gradient(90deg,#006400,#00b894);
color:white;
padding:30px;
text-align:center;
}

header h1{
font-size:38px;
}

header p{
margin-top:8px;
font-size:18px;
}

.container{
width:95%;
max-width:900px;
margin:auto;
padding:20px;
}

.search-box{
margin:20px 0;
}

.search-box input{
width:100%;
padding:14px;
font-size:18px;
border:2px solid #00b894;
border-radius:10px;
outline:none;
}

.geography-card{
background:white;
padding:18px;
margin-bottom:18px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.15);

}

.geography-card:hover{
transform:translateY(-5px);
}

.question{
font-size:22px;
font-weight:bold;
color:#006400;
}

.answer{
margin-top:10px;
font-size:18px;
color:#0066cc;
}

.home{
display:inline-block;
margin-top:25px;
padding:12px 22px;
background:#00b894;
color:white;
text-decoration:none;
border-radius:10px;
}

footer{
background:#02284f;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>🌍 Indian Geography GK</h1>

<p>Learning Skills</p>

</header>

<div class="container">

<div class="search-box">

</div>
