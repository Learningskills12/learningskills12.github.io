<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Section</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fc;
    margin:0;
    padding:20px;
}

.quiz-card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    color:#1e88e5;
}

.option{
    display:block;
    background:#eef3ff;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.option:hover{
    background:#dbe7ff;
}

button{
    background:#1e88e5;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1565c0;
}

#result{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}

.home-btn{
    display:inline-block;
    background:#1e88e5;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="quiz-card">
    <h2>📚 গণিত কুইজ</h2>

    <p id="question"></p>

    <div id="options"></div>

    <button onclick="checkAnswer()">উত্তর জমা দিন</button>

    <p id="result"></p>
</div>

<div style="text-align:center; margin-top:20px;">
    <a href="index.html" class="home-btn">🏠 Back to Home</a>
</div>

<script>
<div class="quiz-card">
<h3>প্রশ্ন ১ (গণিত)</h3>
<p>√144 এর মান কত?</p>
<p>A) 10</p>
<p>B) 11</p>
<p>C) 12</p>
<p>D) 14</p>

<details>
<summary>উত্তর দেখুন</summary>
<p>✅ সঠিক উত্তর: C) 12</p>
</details>
</div>

<div class="quiz-card">
<h3>প্রশ্ন ২ (বাংলা)</h3>
<p>'অরণ্য' শব্দের সমার্থক শব্দ কোনটি?</p>
<p>A) উপবন</p>
<p>B) বন</p>
<p>C) মরুভূমি</p>
<p>D) পাহাড়</p>

<details>
<summary>উত্তর দেখুন</summary>
<p>✅ সঠিক উত্তর: B) বন</p>
</details>
</div>

<div class="quiz-card">
<h3>প্রশ্ন ৩ (ইতিহাস)</h3>
<p>পলাশীর যুদ্ধ কত সালে হয়?</p>
<p>A) 1756</p>
<p>B) 1757</p>
<p>C) 1761</p>
<p>D) 1764</p>

<details>
<summary>উত্তর দেখুন</summary>
<p>✅ সঠিক উত্তর: B) 1757</p>
</details>
</div>

<div class="quiz-card">
<h3>প্রশ্ন ৪ (GK)</h3>
<p>ভারতের জাতীয় সঙ্গীত কে রচনা করেন?</p>
<p>A) বঙ্কিমচন্দ্র চট্টোপাধ্যায়</p>
<p>B) রবীন্দ্রনাথ ঠাকুর</p>
<p>C) কাজী নজরুল ইসলাম</p>
<p>D) শরৎচন্দ্র চট্টোপাধ্যায়</p>

<details>
<summary>উত্তর দেখুন</summary>
<p>✅ সঠিক উত্তর: B) রবীন্দ্রনাথ ঠাকুর</p>
</details>
</div>
    

</script>

</body>
</html>
